services:
  api:
    container_name: inventory-api
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      PORT: ${PORT}
      HOST: ${HOST}
      DB_HOST: inventory-postgres
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: inventory-redis
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: ${REDIS_DB}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN}
      JWT_REFRESH_TTL_SECONDS: ${JWT_REFRESH_TTL_SECONDS}
      ADMIN_LOGIN: ${ADMIN_LOGIN}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      CORS_ORIGINS: ${CORS_ORIGINS}
      CORS_METHODS: ${CORS_METHODS}
      CORS_ALLOWED_HEADERS: ${CORS_ALLOWED_HEADERS}
      CORS_CREDENTIALS: ${CORS_CREDENTIALS}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED}
      SWAGGER_SERVER_URL: ${SWAGGER_SERVER_URL}
    restart: unless-stopped
    networks:
      - inventory-network

  web-panel:
    container_name: inventory-web-panel
    build:
      context: ./web-panel
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    restart: unless-stopped
    networks:
      - inventory-network

  nginx:
    container_name: inventory-nginx
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - '80:80'
    restart: unless-stopped
    depends_on:
      - api
      - web-panel
    networks:
      - inventory-network

networks:
  inventory-network:
    name: inventory-network
